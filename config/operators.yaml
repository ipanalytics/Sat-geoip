operators:
  starlink:
    operator_group: spacex
    service_type: satellite_internet
    orbit_class: leo
    asns:
      - 14593
      - 45700
    rir_org_tokens:
      - starlink
      - spacex
      - space exploration
    geoip_feed: https://geoip.starlinkisp.net/feed.csv
    pop_feed: https://geoip.starlinkisp.net/pops.csv
    notes: ASNs are discovered and expected to grow; AS45700 is a separate Indonesia entity.
  viasat:
    operator_group: viasat
    service_type: satellite_internet
    orbit_class: geo_or_hybrid_satellite
    asns:
      - 7155
      - 40306
    rir_org_tokens:
      - viasat
    geoip_feed: https://raw.githubusercontent.com/Viasat/geofeed/refs/heads/main/geofeed.csv
    pop_feed:
    notes: Viasat backbone and group geofeed; Inmarsat AS31515 is modeled separately under the Viasat operator group.
  inmarsat:
    operator: "Inmarsat"
    operator_group: viasat
    service_type: satellite_internet
    orbit_class: geo_or_hybrid_satellite
    asns:
      - 31515
    rir_org_tokens:
      - inmarsat
      - inmarsat global
    data_layers:
      - bgp_origin_prefixes
      - rdap
      - rpki
    geofeed:
      status: not_found
    notes:
      - "Inmarsat is now under Viasat Group but AS31515 remains separately attributable."
      - "No public RFC 8805 geofeed known for AS31515; gateway/mobile maritime semantics only."
  thuraya:
    operator: "Thuraya"
    operator_group: space42
    service_type: mss_narrowband
    orbit_class: geo_mss
    asns:
      - 44703
    rir_org_tokens:
      - thuraya
      - yahsat
      - space42
    data_layers:
      - bgp_origin_prefixes
      - rdap
      - rpki
    geofeed:
      status: not_found
    notes:
      - "GEO mobile satellite services operator; not broadband LEO."
      - "No public geofeed known; gateway regions are not customer GeoIP."
  ses_o3b:
    operator: "SES Networks / O3b"
    operator_group: ses
    service_type: satellite_internet
    orbit_class: meo
    asns:
      - 60725
    rir_org_tokens:
      - o3b
      - ses networks
      - ses
    irr_sets:
      - AS-O3B
      - AS-O3B-TX-US
    data_layers:
      - bgp_origin_prefixes
      - peeringdb
      - rdap
      - rpki
      - gateway_reference_locations
    geofeed:
      status: not_found
    gateway_country_reference:
      - ZA
      - PE
      - BR
      - PT
      - AU
      - GR
      - US
      - CL
      - AE
      - SN
    notes:
      - "Do not treat gateway countries as customer GeoIP."
      - "Good model for discontiguous satellite gateway networks."
      - "Do not include SES ASTRA AS12684; it is broadcast/media infrastructure, not satellite internet."
  marlink:
    operator: "Marlink"
    operator_group: marlink
    service_type: satellite_service_provider
    orbit_class: mixed_satellite
    asns:
      - 5377
      - 55784
    rir_org_tokens:
      - marlink
      - vizada
    data_layers:
      - bgp_origin_prefixes
      - peeringdb
      - rdap
      - rpki
    geofeed:
      status: not_found
    notes:
      - "Do not classify as LEO."
      - "Use as maritime/enterprise satellite connectivity provider."
      - "Likely mixed satellite + terrestrial backbone."
  hughes:
    operator: "Hughes / HughesNet"
    operator_group: echostar
    service_type: satellite_internet
    orbit_class: geo
    asns:
      - 6621
      - 63062
    rir_org_tokens:
      - hughes
      - echostar
      - hughesnet
    data_layers:
      - bgp_origin_prefixes
      - rdap
      - rpki
    geofeed:
      status: not_found
    notes:
      - "No public RFC 8805 geofeed known; BGP-derived operator."
      - "Regional Hughes entities should be discovered and appended over time."
  oneweb:
    operator: "Eutelsat OneWeb"
    operator_group: eutelsat_oneweb
    service_type: satellite_internet
    orbit_class: leo
    asns:
      - 800
    rir_org_tokens:
      - oneweb
      - eutelsat oneweb
      - network access associates
      - worldvu
    irr_sets:
      - AS-OW
    data_layers:
      - bgp_origin_prefixes
      - peeringdb
      - rdap
      - rpki
      - facility_reference_locations
    geofeed:
      status: not_found
    pop_feed:
    notes:
      - "Core LEO satellite internet operator; must be separated from Eutelsat/Skylogic GEO infrastructure."
      - "PeeringDB facilities are interconnection/gateway references, not customer GeoIP."
      - "No public Starlink-style RFC 8805 geofeed known; use BGP-derived prefixes only."
  intelsat:
    operator: "Intelsat"
    operator_group: intelsat
    service_type: satellite_internet
    orbit_class: geo_or_multi_orbit
    asns:
      - 22351
      - 26243
    rir_org_tokens:
      - intelsat
      - intelsat global
      - intelsat global service
    irr_sets:
      - AS-INTELSATUS
      - RS-INTELSAT
    data_layers:
      - bgp_origin_prefixes
      - peeringdb
      - rdap
      - rpki
    geofeed:
      status: not_found
    pop_feed:
    notes:
      - "Large GEO / multi-orbit satellite connectivity operator."
      - "Use as BGP-derived satellite operator; do not infer customer location without geofeed."
      - "SES acquisition may consolidate Intelsat under the SES group over time."
  avanti:
    operator: "Avanti Communications"
    operator_group: avanti
    service_type: satellite_internet
    orbit_class: geo
    asns:
      - 39356
      - 328306
    rir_org_tokens:
      - avanti
      - avanti communications
      - avanti broadband
      - iwayafrica
    data_layers:
      - bgp_origin_prefixes
      - rdap
      - rpki
    geofeed:
      status: not_found
    pop_feed:
    notes:
      - "GEO satellite broadband / VSAT provider, especially useful for Africa/EMEA coverage."
      - "AS328306 is Avanti Communications South Africa; AS39356 is Avanti Broadband Ltd."
      - "No public operator geofeed known."
  speedcast:
    operator: "Speedcast"
    operator_group: speedcast
    service_type: satellite_service_provider
    orbit_class: mixed_satellite
    asns:
      - 4913
      - 5666
      - 38456
      - 132160
    rir_org_tokens:
      - speedcast
      - speedcast australia
      - speedcast managed services
      - oceanic broadband
    data_layers:
      - bgp_origin_prefixes
      - peeringdb
      - rdap
      - rpki
    geofeed:
      status: not_found
    pop_feed:
    notes:
      - "Satellite and hybrid connectivity provider, not a pure LEO/GEO constellation owner."
      - "Use as maritime, energy, remote-site and enterprise satellite connectivity layer."
      - "May include terrestrial/hybrid infrastructure; keep service_type as satellite_service_provider."
  eutelsat_skylogic:
    operator: "Eutelsat / Skylogic"
    operator_group: eutelsat
    service_type: satellite_internet
    orbit_class: geo_or_hybrid_satellite
    asns:
      - 29286
    rir_org_tokens:
      - eutelsat
      - skylogic
      - skylogic s.p.a
    data_layers:
      - bgp_origin_prefixes
      - peeringdb
      - rdap
      - rpki
    geofeed:
      status: not_found
    pop_feed:
    notes:
      - "Separate from Eutelsat OneWeb AS800."
      - "Use for GEO/hybrid satellite ISP prefixes and legacy Eutelsat/Skylogic infrastructure."
      - "Do not merge with OneWeb LEO semantics."
